<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ec5b13",
                        "background-light": "#f8f6f6",
                        "background-dark": "#0a192f", /* Modified to navy for oceanic theme */
                        "ocean-teal": "#134e4a",
                        "ocean-navy": "#0f172a",
                    },
                    fontFamily: {
                        "display": ["Public Sans"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .glass-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        .glass-button {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .oceanic-gradient {
            background: radial-gradient(circle at top right, #134e4a, #0f172a 60%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-display">
<div class="relative flex h-screen w-full flex-col oceanic-gradient overflow-hidden">
<header class="flex items-center p-6 justify-between z-10">
<button class="glass-button size-10 flex items-center justify-center rounded-xl text-slate-100">
<span class="material-symbols-outlined">expand_more</span>
</button>
<div class="text-center">
<p class="text-xs uppercase tracking-widest text-slate-400 font-semibold">Playing from Playlist</p>
<h2 class="text-slate-100 text-sm font-bold">Deep Sea Echoes</h2>
</div>
<button class="glass-button size-10 flex items-center justify-center rounded-xl text-slate-100">
<span class="material-symbols-outlined">more_horiz</span>
</button>
</header>
<main class="flex-1 flex flex-col items-center justify-center px-8 pb-12">
<div class="glass-card w-full max-w-md rounded-[2.5rem] p-8 flex flex-col items-center shadow-2xl">
<div class="w-full aspect-square rounded-3xl overflow-hidden shadow-2xl mb-8 relative group">
<img alt="Oceanic Glass" class="w-full h-full object-cover" data-alt="Abstract deep blue underwater light rays" src="https://lh3.googleusercontent.com/aida-public/AB6AXuA3JadFIAdwSiJOTM9F-Cr32BG4YjK5doBgujCFXwhxmenNHOZMlyK4l5S2COUbjIwqZYbADtnv36JlI5q24oNZNWZRN0RJyQkmXH9IFY8eXbSyKRfo647qRqhYeGT_D4dM42w24xIinNoW1vvWZcebrcKqvPCmheMe8rdRSvdMST7IAuUcgjUDqqgyoEDivmQzLprKf2oSduBFOPxDwoTzUhXkHjVrVmepxGajrn8J7kjPSM11rxXZV_2v53Fa26AFj7BJKwxPyXw"/>
<div class="absolute inset-0 bg-black/10"></div>
</div>
<div class="w-full text-left mb-8">
<h1 class="text-slate-100 text-3xl font-bold tracking-tight mb-1">Oceanic Glass</h1>
<p class="text-slate-400 text-lg font-medium">Deep Sea Echoes</p>
</div>
<div class="w-full mb-8">
<div class="relative w-full h-1.5 bg-white/10 rounded-full mb-3">
<div class="absolute top-0 left-0 h-full w-[45%] bg-white rounded-full"></div>
<div class="absolute top-1/2 left-[45%] -translate-y-1/2 -translate-x-1/2 size-4 bg-white rounded-full shadow-lg"></div>
</div>
<div class="flex justify-between text-xs font-medium text-slate-400">
<span>2:14</span>
<span>4:52</span>
</div>
</div>
<div class="flex items-center justify-between w-full px-2">
<button class="text-slate-400 hover:text-white transition-colors">
<span class="material-symbols-outlined text-2xl">shuffle</span>
</button>
<div class="flex items-center gap-6">
<button class="text-slate-100">
<span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'FILL' 1">skip_previous</span>
</button>
<button class="size-20 flex items-center justify-center bg-white rounded-full text-ocean-navy shadow-xl shadow-white/5 active:scale-95 transition-transform">
<span class="material-symbols-outlined text-5xl" style="font-variation-settings: 'FILL' 1">play_arrow</span>
</button>
<button class="text-slate-100">
<span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'FILL' 1">skip_next</span>
</button>
</div>
<button class="text-slate-400 hover:text-white transition-colors">
<span class="material-symbols-outlined text-2xl">repeat</span>
</button>
</div>
</div>
<div class="flex w-full max-w-md justify-between mt-8 px-4">
<button class="glass-button px-6 py-3 rounded-2xl flex items-center gap-2 text-slate-100 text-sm font-medium">
<span class="material-symbols-outlined text-lg">favorite</span>
                    Like
                </button>
<button class="glass-button px-6 py-3 rounded-2xl flex items-center gap-2 text-slate-100 text-sm font-medium">
<span class="material-symbols-outlined text-lg">share</span>
                    Share
                </button>
<button class="glass-button px-4 py-3 rounded-2xl flex items-center text-slate-100">
<span class="material-symbols-outlined text-lg">playlist_add</span>
</button>
</div>
</main>
<nav class="glass-card mt-auto border-t-0 border-x-0 rounded-t-[2.5rem] px-8 pb-8 pt-4">
<div class="flex justify-between items-center max-w-md mx-auto">
<a class="flex flex-col items-center gap-1 text-white" href="#">
<span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1">home</span>
<span class="text-[10px] font-bold uppercase tracking-wider">Home</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400" href="#">
<span class="material-symbols-outlined text-2xl">search</span>
<span class="text-[10px] font-bold uppercase tracking-wider">Search</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400" href="#">
<span class="material-symbols-outlined text-2xl">library_music</span>
<span class="text-[10px] font-bold uppercase tracking-wider">Library</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400" href="#">
<span class="material-symbols-outlined text-2xl">person</span>
<span class="text-[10px] font-bold uppercase tracking-wider">Profile</span>
</a>
</div>
</nav>
<div class="absolute -bottom-24 -left-24 size-96 bg-ocean-teal/20 blur-[120px] rounded-full"></div>
<div class="absolute -top-24 -right-24 size-96 bg-primary/10 blur-[120px] rounded-full"></div>
</div>
</body></html>
